<!--
 * MindWord - 树心 | 重置密码页面
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - MindWord</title>
    <link rel="icon" href="res/LOGO32.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }
        p {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #4a5568;
            font-size: 13px;
            font-weight: 500;
        }
        .password-wrapper {
            position: relative;
        }
        input {
            width: 100%;
            padding: 12px 45px 12px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: #718096;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-btn:hover {
            color: #4a5568;
        }
        .toggle-btn svg {
            width: 20px;
            height: 20px;
        }
        .btn {
            height: 48px;
            width: 100%;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #9fc0f5 0%, #53a8cf 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0 24px;
            margin-top: 8px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error {
            color: #e53e3e;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        .success {
            display: none;
        }
        .success .icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: #48bb78;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
        }
        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js?v=2026.05.22.0657"></script>
</head>
<body>
    <div class="container">
        <!-- 重置密码表单 -->
        <div id="reset-form">
            <h1>重置密码</h1>
            <p>请输入您的新密码</p>
            
            <div class="form-group">
                <label>新密码</label>
                <div class="password-wrapper">
                    <input type="password" id="new-pass" placeholder="至少6位字符">
                    <button type="button" class="toggle-btn" id="toggle-new" title="显示/隐藏密码">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="form-group">
                <label>确认密码</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-pass" placeholder="再次输入密码">
                    <button type="button" class="toggle-btn" id="toggle-confirm" title="显示/隐藏密码">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="error" id="error-msg"></div>
            <button class="btn" id="btn-reset">确认重置</button>
        </div>
        
        <!-- 成功状态 -->
        <div class="success" id="success-state">
            <div class="icon">✓</div>
            <h1>重置成功！</h1>
            <p>您的密码已重置，请使用新密码登录</p>
            <a href="auth.html" class="btn" style="display: inline-block; text-decoration: none; margin-top: 16px;">去登录</a>
        </div>
    </div>

    <script>
        // 密码显示切换
        function initToggle(inputId, btnId) {
            const input = document.getElementById(inputId);
            const btn = document.getElementById(btnId);
            
            btn.addEventListener('click', function() {
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                
                // 切换图标
                if (isPassword) {
                    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>`;
                } else {
                    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>`;
                }
            });
        }
        
        initToggle('new-pass', 'toggle-new');
        initToggle('confirm-pass', 'toggle-confirm');
        
        // 等待 Supabase 初始化
        async function waitForSupabase() {
            let attempts = 0;
            while (attempts < 50) {
                if (typeof window.getSupabase === 'function') {
                    const client = window.getSupabase();
                    if (client) return client;
                }
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            throw new Error('Supabase 初始化失败');
        }
        
        // 检查 URL 中是否包含 recovery token
        function hasRecoveryToken() {
            const hash = window.location.hash;
            return hash && (hash.includes('access_token') || hash.includes('type=recovery'));
        }
        
        // 如果没有 recovery token，禁用按钮
        if (!hasRecoveryToken()) {
            document.getElementById('error-msg').textContent = '链接无效或已过期，请重新申请重置密码';
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('btn-reset').disabled = true;
        }
        
        // 重置密码
        document.getElementById('btn-reset').addEventListener('click', async function() {
            const newPass = document.getElementById('new-pass').value;
            const confirmPass = document.getElementById('confirm-pass').value;
            const errorEl = document.getElementById('error-msg');
            const btn = document.getElementById('btn-reset');
            
            // 验证
            if (!newPass || newPass.length < 6) {
                errorEl.textContent = '密码至少6位';
                errorEl.style.display = 'block';
                return;
            }
            
            if (newPass !== confirmPass) {
                errorEl.textContent = '两次密码不一致';
                errorEl.style.display = 'block';
                return;
            }
            
            // 禁用按钮，显示加载状态
            btn.disabled = true;
            btn.textContent = '处理中...';
            errorEl.style.display = 'none';
            
            try {
                console.log('开始重置密码...');
                const supabase = await waitForSupabase();
                console.log('Supabase 已初始化');
                
                // Supabase 配置了 detectSessionInUrl: true，会自动从 URL 中提取 token
                // 等待一下让 Supabase 有时间处理 URL
                await new Promise(r => setTimeout(r, 500));
                
                // 检查当前用户是否已通过 URL token 认证
                const { data: { user }, error: userError } = await supabase.auth.getUser();
                console.log('当前用户:', user, '错误:', userError);
                
                if (!user) {
                    // 如果用户未认证，尝试手动设置 session
                    console.log('用户未认证，尝试从 URL 获取 token...');
                    
                    const hash = window.location.hash.substring(1);
                    const params = new URLSearchParams(hash);
                    const accessToken = params.get('access_token');
                    const refreshToken = params.get('refresh_token') || '';
                    
                    if (!accessToken) {
                        throw new Error('无法从链接中获取认证信息');
                    }
                    
                    console.log('设置 session...');
                    const { error: sessionError } = await supabase.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });
                    
                    if (sessionError) {
                        console.error('设置 session 失败:', sessionError);
                        throw sessionError;
                    }
                    console.log('Session 设置成功');
                }
                
                // 更新密码
                console.log('更新密码...');
                const { error } = await supabase.auth.updateUser({ password: newPass });
                
                if (error) {
                    console.error('更新密码失败:', error);
                    throw error;
                }
                console.log('密码更新成功');
                
                // 登出用户，让用户用新密码重新登录
                await supabase.auth.signOut();
                console.log('已登出，请用户重新登录');
                
                // 显示成功
                document.getElementById('reset-form').style.display = 'none';
                document.getElementById('success-state').style.display = 'block';
                
            } catch (err) {
                console.error('重置密码出错:', err);
                errorEl.textContent = '重置失败：' + (err.message || '链接已过期，请重新申请');
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '确认重置';
            }
        });
    </script>
</body>
</html>
