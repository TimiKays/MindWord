<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>支持一下 · MindWord</title>

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #eaf7f5, #eef3ff);
      --primary: #5bbcb3;
      --text-main: #2f3a3a;
      --text-sub: #6b7c7c;
      --card-bg: rgba(255, 255, 255, 0.75);
      --border-soft: rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-gradient);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 92%;
      width: 450px;
      padding: 28px 26px 30px;
      background: var(--card-bg);
      border-radius: 20px;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 10px;
      font-weight: 600;
    }

    p.desc {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.6;
      margin-bottom: 22px;
    }

    /* 👍 点赞按钮 */
    .like-area {
      margin: 22px 0 12px;
      position: relative;
    }

    .like-btn {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: none;
      background: white;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
      font-size: 36px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .like-btn:active {
      transform: scale(0.9);
    }

    .like-count {
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-sub);
    }

    /* 💬 随机感谢语 */
    .thanks {
      min-height: 20px;
      margin-top: 14px;
      font-size: 14px;
      color: var(--primary);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .thanks.show {
      opacity: 1;
    }

    /* ✨ 点赞动画粒子 */
    .bubble {
      position: fixed;
      font-size: 18px;
      pointer-events: none;
      animation: floatUp 1.2s ease-out forwards;
      z-index: 1000;
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.6);
      }

      20% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -110px) scale(1.2);
      }
    }

    /* 🔗 其他支持方式 */
    .actions {
      margin-top: 26px;
      display: grid;
      gap: 10px;
    }

    .action {
      font-size: 13px;
      color: var(--text-sub);
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 10px;
      background: white;
      border: 1px solid var(--border-soft);
      transition: background 0.2s;
    }

    .action:hover {
      background: #f6fbfb;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #9aa;
    }

    /* 顶部导航栏 - 从 feedback.html 复制 */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      z-index: 1000;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-family: 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin-left: 0;
      font-weight: 700;
      font-size: 26px;
      display: flex;
      align-items: center;
    }

    .brand-clickable {
      background: linear-gradient(0deg, #0b82e4 0%, #11c49d 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .brand-clickable:hover {
      opacity: 0.8;
    }

    .brand-clickable img {
      width: 32px;
      height: 32px;
      vertical-align: middle;
      margin-right: 8px;
    }

    /* 为主体内容添加偏移 */
    .main-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding-top: 60px;
      /* 为头部留出空间 */
    }

    /* 微信赞赏弹窗 */
    .wechat-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .wechat-modal.active {
      display: flex;
    }

    .wechat-qrcode {
      max-width: 80%;
      max-height: 80%;
      border: 4px solid white;
      border-radius: 8px;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 24px;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover {
      background: rgba(0, 0, 0, 0.7);
    }
  </style>
</head>

    // 获取当前语言
    function getCurrentLang() {
      return localStorage.getItem('mw_lang') || 'zh';
    }

    // 获取当前日期（YYYY-MM-DD格式）
    function getCurrentDate() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    // 检查每日点赞限制
    function checkDailyLikeLimit() {
      const today = getCurrentDate();
      const storedDate = localStorage.getItem('mw_like_date');
      let dailyCount = parseInt(localStorage.getItem('mw_like_daily_count') || '0');

      // 如果是新的一天，重置计数
      if (storedDate !== today) {
        localStorage.setItem('mw_like_date', today);
        localStorage.setItem('mw_like_daily_count', '0');
        dailyCount = 0;
      }

      return {
        canLike: dailyCount < 100,
        currentCount: dailyCount,
        remaining: 100 - dailyCount
      };
    }

    // 增加每日点赞计数
    function incrementDailyLikeCount() {
      const today = getCurrentDate();
      const storedDate = localStorage.getItem('mw_like_date');
      let dailyCount = parseInt(localStorage.getItem('mw_like_daily_count') || '0');

      // 如果是新的一天，重置计数
      if (storedDate !== today) {
        localStorage.setItem('mw_like_date', today);
        localStorage.setItem('mw_like_daily_count', '0');
        dailyCount = 0;
      }

      // 增加计数
      dailyCount++;
      localStorage.setItem('mw_like_daily_count', dailyCount.toString());

      return dailyCount;
    }

    // 获取翻译文本
    function t(key, params = {}) {
      const lang = getCurrentLang();
      let text = i18n[lang][key] || i18n.zh[key] || key;

      // 替换参数
      Object.keys(params).forEach(key => {
        text = text.replace(new RegExp(`{${key}}`, 'g'), params[key]);
      });

      return text;
    }

      document.querySelector('h1').innerHTML = t('header');
      document.querySelector('.desc').innerHTML = t('description');
      document.querySelector('.footer').textContent = t('footer');
      document.querySelector('a[href="/feedback.html"]').innerHTML = t('feedback');
      document.getElementById('shareBtn').innerHTML = t('share');
      document.getElementById('visitCreatorBtn').innerHTML = t('visitCreator');
      document.getElementById('wechatBtn').innerHTML = t('wechatSupport');

      // 更新微软应用商店链接文本
      const microsoftStoreLink = document.querySelector('a[href*="apps.microsoft.com"]');
      if (microsoftStoreLink) {
        microsoftStoreLink.innerHTML = t('microsoftStore');
      }

    const likeCountEl = document.getElementById("likeCount");
    const thanksText = document.getElementById("thanksText");

    likeCountEl.textContent = t('loading');

    // Cloudflare Worker API地址
    const WORKER_URL = 'https://good.mindword.dpdns.org/api/likes';

    // 简单防抖配置
    let isProcessing = false;
    let lastClickTime = 0;
    const DEBOUNCE_DELAY = 500; // 500ms防抖，防止连点

    // 初始化加载云端点赞数
    async function loadLikes() {
      try {
        const response = await fetch(WORKER_URL);
        if (!response.ok) throw new Error('Network response was not ok');
        const data = await response.json();

        // 更新本地存储
        localStorage.setItem("mw_like_count", data.count);
        likeCountEl.textContent = t('likeCountLoaded', { count: data.count });

        return data.count;
      } catch (error) {
        console.log(t('cloudLoadFailed'), error);
        // 降级到本地存储
        const localCount = Number(localStorage.getItem("mw_like_count") || 0);
        likeCountEl.textContent = t('likeCountLoaded', { count: localCount });
        return localCount;
      }
    }

      count = cloudCount;

    likeBtn.addEventListener("click", async (e) => {
      // 检查每日点赞限制
      const limitInfo = checkDailyLikeLimit();

      if (!limitInfo.canLike) {
        // 达到每日限制，显示提示，但保留交互效果
        thanksText.textContent = t('dailyLimitReached');
        thanksText.classList.remove("show");
        void thanksText.offsetWidth;
        thanksText.classList.add("show");

        // 仍然保留视觉反馈效果
        likeCountEl.style.transform = 'scale(1.1)';
        setTimeout(() => {
          likeCountEl.style.transform = 'scale(1)';
        }, 150);

        // ✨ 粒子动画（同步进行，不阻塞）
        const x = e.clientX;
        const y = e.clientY;
        const bubble = document.createElement("span");
        bubble.className = "bubble";
        bubble.textContent = ['💙', '🌱', '✨', '🫧'][Math.floor(Math.random() * 4)];
        bubble.style.left = x + "px";
        bubble.style.top = y + "px";
        document.body.appendChild(bubble);
        setTimeout(() => bubble.remove(), 1200);

        return; // 不执行后续点赞逻辑和API调用
      }

      // 🎯 立即更新本地状态和显示（让用户感觉超快）
      count++;
      // 增加每日计数
      incrementDailyLikeCount();
      localStorage.setItem("mw_like_count", count);
      likeCountEl.textContent = t('likeCountLoaded', { count: count });

      likeCountEl.style.transform = 'scale(1.1)'; // 轻微放大效果
      setTimeout(() => {
        likeCountEl.style.transform = 'scale(1)';
      }, 150);

      // ✨ 粒子动画（同步进行，不阻塞）
      const x = e.clientX;
      const y = e.clientY;
      const bubble = document.createElement("span");
      bubble.className = "bubble";
      bubble.textContent = ['💙', '🌱', '✨', '🫧'][Math.floor(Math.random() * 4)];
      bubble.style.left = x + "px";
      bubble.style.top = y + "px";
      document.body.appendChild(bubble);
      setTimeout(() => bubble.remove(), 1200);

      // 💬 感谢语（也立即显示）
      const msg = t('thanksMessages')[Math.floor(Math.random() * t('thanksMessages').length)];
      thanksText.textContent = msg;
      thanksText.classList.remove("show");
      void thanksText.offsetWidth;
      thanksText.classList.add("show");

      // 🚀 后台异步同步到云端（不阻塞用户体验）
      setTimeout(async () => {
        try {
          const response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            }
          });

          if (response.ok) {
            const data = await response.json();
            // 如果云端数据与本地不一致，可以选择是否更新显示
            // 这里选择不更新，保持用户的即时反馈
            console.log(t('cloudSyncSuccess'), data.count);
          } else {
            console.log(t('cloudSyncFailed'), response.status);
          }
        } catch (error) {
          console.log(t('cloudSyncError'), error);
          // 网络失败也没关系，本地数据已经更新了
        }
      }, 0); // 立即在后台执行

      isProcessing = false;
    });

    // 分享按钮功能
    const shareBtn = document.getElementById('shareBtn');
    shareBtn.addEventListener('click', (e) => {
      e.preventDefault();

      // 复制链接到剪贴板
      const shareUrl = 'https://mindword.dpdns.org';

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(shareUrl).then(() => {
          // 显示复制成功反馈
          const originalText = shareBtn.innerHTML;
          shareBtn.innerHTML = t('shareSuccess');
          shareBtn.style.background = '#e8f5e8';
          shareBtn.style.color = '#2d7d32';

          setTimeout(() => {
            shareBtn.innerHTML = originalText;
            shareBtn.style.background = '';
            shareBtn.style.color = '';
          }, 2000);
        }).catch(() => {
          // 降级方案
          fallbackCopyText(shareUrl);
        });
      } else {
        // 降级方案
        fallbackCopyText(shareUrl);
      }
    });

    // 降级复制方案
    function fallbackCopyText(text) {
      const textArea = document.createElement('textarea');
      textArea.value = text;
      textArea.style.position = 'fixed';
      textArea.style.left = '-999999px';
      textArea.style.top = '-999999px';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();

      try {
        document.execCommand('copy');
        const originalText = shareBtn.innerHTML;
        shareBtn.innerHTML = t('shareSuccess');
        shareBtn.style.background = '#e8f5e8';
        shareBtn.style.color = '#2d7d32';

        setTimeout(() => {
          shareBtn.innerHTML = originalText;
          shareBtn.style.background = '';
          shareBtn.style.color = '';
        }, 2000);
      } catch (err) {
        shareBtn.innerHTML = t('shareFailed');
        setTimeout(() => {
          shareBtn.innerHTML = t('shareRestore');
        }, 2000);
      }

      document.body.removeChild(textArea);
    }

    // 微信赞赏弹窗功能
    const wechatModal = document.getElementById('wechatModal');
    const wechatBtn = document.getElementById('wechatBtn');
    const closeBtn = document.getElementById('closeBtn');

    wechatBtn.onclick = function () {
      wechatModal.classList.add('active');
    }

    closeBtn.onclick = function () {
      wechatModal.classList.remove('active');
    }

    window.onclick = function (event) {
      if (event.target == wechatModal) {
        wechatModal.classList.remove('active');
      }
    }
  </script>
