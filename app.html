    <style>
        /* 完全匹配你贴出的按钮组外观（非 Tailwind 实现） */
        .tabs {
            display: flex;
            align-items: center;
            gap: 6px;
            /* 等同于 tailwind 的 gap-4 */
            border-radius: 8px;
            padding: 4px;
            /* p-1 */
            background-color: rgba(0, 0, 0, 0.05);
            /* bg-black/5 */
            /* 深色模式可自行扩展，如果需要我可以加 media-query 或 .dark 前缀 */
            font-size: 14px;
            /* text-sm */
            font-weight: 500;
            /* font-medium */
            width: fit-content;
            box-sizing: border-box;
            flex: 0 0 auto;
        }

        /* 每个 tab 视觉等同于你给的 button */
        .tab {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            /* 等同于 gap-2 */
            padding: 6px 12px;
            /* py-1.5 px-3 */
            border-radius: 6px;
            /* rounded-md */
            cursor: pointer;
            transition: color 0.15s ease, background-color 0.15s ease;
            color: #6b7280;
            /* text-gray-500 */
            background: transparent;
            box-shadow: none;
            white-space: nowrap;
            line-height: 1;
        }

        /* 非激活 hover 仅改变文字颜色（与示例一致） */
        .tab:not(.active):hover {
            color: #101922;
            /* hover:text-[#101922] */
        }

        /* 激活项：白底、深色文字、轻阴影 */
        .tab.active {
            background: #ffffff;
            color: #101922;
            /* text-[#101922] */
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
            /* shadow-sm 风格 */
        }

        /* 图标：如果是 SVG 控制大小/填充；如果是 font icon（material symbols）也能兼容 */
        .tab svg,
        .tab .icon,
        .tab .material-symbols-outlined {
            width: 16px;
            height: 16px;
            display: inline-block;
            vertical-align: middle;
            flex: 0 0 16px;
        }

        /* 如果使用 SVG，控制 fill；font icon 使用 color */
        .tab svg {
            fill: currentColor;
        }

        .tab .icon {
            fill: currentColor;
        }

        /* 激活/非激活颜色通过 color（currentColor）变化即可 */
        .tab:not(.active) svg,
        .tab:not(.active) .icon {
            opacity: 0.85;
            color: #6b7280;
        }

        .tab.active svg,
        .tab.active .icon {
            color: #101922;
            opacity: 1;
        }

        /* 文本 */
        .tab>span {
            font-size: 14px;
            font-weight: 500;
            line-height: 16px;
            color: inherit;
            /* 继承 currentColor */
        }

        /* emoji 的尺寸与图标一致 */
        .tab>.emoji,
        .tab>.emj {
            font-size: 16px;
            line-height: 16px;
            display: inline-block;
        }

        /* 可访问的焦点环（轻量） */
        .tab:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(16, 25, 34, 0.08);
        }

        /* 在小屏时，如果需要克隆到底部，保持隐藏/显示逻辑不变（JS 控制 show/hide） */
        .mobile-tabs {
            display: none;
            gap: 8px;
        }

        @media (max-width: 768px) {
            .header .tabs {
                display: none;
            }

            .mobile-tabs {
                display: flex;
                position: fixed;
                bottom: 8px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 999;
                gap: 8px;
            }

            /* 移动端汉堡图标居中调整 */
            #doc-menu-btn {
                top: 10px !important;
                /* transform: translateY(-50%); */
                left: 12px;
            }

            /* LOGO向右移动 */
            .header .brand {
                margin-left: 25px !important;
            }

            /* 移动端显示认证区域 */
            .header-right {
                display: flex !important;
                align-items: center;
                margin-left: auto;

            }

            /* 移动端认证区域样式调整 */
            #auth-area {
                margin-left: 8px !important;
                margin-right: 0 !important;
            }

            #auth-link,
            #auth-user {
                height: 32px !important;
                font-size: 11px !important;
                min-width: 70px !important;
                justify-content: center !important;
            }

            #auth-username {
                font-size: 12px !important;
                max-width: 40px !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
                white-space: nowrap !important;
            }

            #auth-logout {
                height: 32px !important;
                font-size: 11px !important;
                padding: 0 8px !important;
            }

            /* 个人菜单下拉样式 */
            .user-dropdown {
                display: inline-flex;
                align-items: center;
                cursor: pointer;
                padding: 6px 12px;
                border-radius: 6px;
                transition: background-color 0.2s;
            }

            .user-dropdown:hover {
                background-color: #f8fafc;
            }

            .dropdown-arrow {
                margin-left: 4px;
                font-size: 12px;
                transition: transform 0.2s;
                color: #64748b;
            }

            .user-menu-dropdown {
                position: absolute;
                top: 100%;
                right: 0;
                background: white;
                border: 1px solid #e5e7eb;
                border-radius: 8px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
                min-width: 240px;
                z-index: 1000;
                display: none;
                margin-top: 4px;
            }

            .menu-header {
                padding: 12px 16px;
                border-bottom: 1px solid #f1f5f9;
                background-color: #f8fafc;
                border-radius: 8px 8px 0 0;
            }

            .menu-username {
                font-weight: 600;
                color: #1e293b;
                font-size: 16px;
                margin-bottom: 2px;
            }

            .menu-email {
                font-size: 13px;
                color: #64748b;
            }

            .menu-item {
                padding: 10px 16px;
                cursor: pointer;
                transition: background-color 0.2s;
                border-bottom: 1px solid #f8fafc;
                display: flex;
                align-items: center;
                font-size: 14px;
                color: #374151;
            }

            .menu-item:hover {
                background-color: #f8fafc;
            }

            .menu-item span {
                font-size: 13px;
            }

            .menu-item:last-child {
                border-bottom: none;
                border-radius: 0 0 8px 8px;
            }

            .menu-item.danger {
                color: #dc2626;
            }

            .menu-item.danger:hover {
                background-color: #fef2f2;
            }

            .menu-icon {
                margin-right: 10px;
                width: 16px;
                text-align: center;
                color: #64748b;
            }

            /* 个人菜单移动端样式 */
            .user-dropdown {
                padding: 4px 8px !important;
            }

            .user-menu-dropdown {
                top: 32px !important;
                right: 0 !important;
                min-width: 200px !important;
                max-width: 240px !important;
            }

            .menu-header {
                padding: 8px 12px !important;
            }

            .menu-username {
                font-size: 14px !important;
            }

            .menu-email {
                font-size: 11px !important;
            }

            .menu-item {
                padding: 6px 12px !important;
                font-size: 12px !important;
            }
        }
    </style>

<body>
    <!-- 文档侧栏触发按钮与侧栏 -->
    <style>
        #doc-menu-btn {
            position: fixed;
            top: 17px;
            left: 15px;
            z-index: 1001;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #fff;
            color: #111827;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
        }

        #doc-menu-btn:hover {
            background: #f8fafc;
        }

        #doc-sidebar {
            position: fixed;
            top: 68px;
            left: 0;
            width: 560px;
            max-width: 80vw;
            height: calc(100vh - 68px);
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            /* 默认无阴影，避免隐藏时阴影溢出 */
            box-shadow: none;
            z-index: 10000;
            transform: translateX(-100%);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            display: flex;
            flex-direction: column;
        }

        #doc-sidebar.open {
            transform: translateX(0);
            /* 打开时才显示阴影 */
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        #doc-sidebar .side-header {
            padding: 10px 12px;
            border-bottom: 1px solid #f1f5f9;
            position: relative;
        }

        #doc-sidebar .side-header .title {
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 8px;
        }

        #doc-sidebar .side-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        #doc-sidebar .side-header .title {
            font-weight: 600;
            color: #0f172a;
        }

        #doc-sidebar .side-actions {
            display: flex;
            gap: 6px;
            padding-right: 40px;
            /* 为关闭按钮留出空间 */
            flex-wrap: wrap;
        }

        /* 批量操作按钮样式 */
        #doc-sidebar .batch-actions {
            display: none;
            gap: 6px;
            padding: 8px 12px;
            border-bottom: 1px solid #f1f5f9;
            background: #fef3c7;
        }

        #doc-sidebar .batch-actions.show {
            display: flex;
        }

        #doc-sidebar .batch-actions button {
            height: 28px;
            padding: 0 8px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background: #fff;
            color: #334155;
            cursor: pointer;
            font-size: 12px;
        }

        #doc-sidebar .batch-actions button:hover {
            background: #f8fafc;
        }

        #doc-sidebar .batch-actions button.batch-delete {
            background: #ef4444;
            color: white;
            border-color: #dc2626;
        }

        #doc-sidebar .batch-actions button.batch-delete:hover {
            background: #dc2626;
        }

        /* 删除确认对话框样式 */
        .delete-confirm-dialog {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 20px;
            z-index: 10001;
            min-width: 300px;
            max-width: 90%;
        }

        .delete-confirm-dialog .confirm-message {
            margin-bottom: 16px;
            font-size: 14px;
            color: #374151;
            line-height: 1.5;
        }

        .delete-confirm-dialog .confirm-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .delete-confirm-dialog .confirm-buttons button {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #334155;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-confirm-dialog .confirm-buttons button:hover {
            background: #f8fafc;
        }

        .delete-confirm-dialog .confirm-buttons button.confirm-btn {
            background: #3b82f6;
            color: white;
            border-color: #2563eb;
        }

        .delete-confirm-dialog .confirm-buttons button.confirm-btn:hover {
            background: #2563eb;
        }

        .delete-confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
        }

        #doc-sidebar .side-actions button {
            height: 28px;
            padding: 0 8px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background: #fff;
            color: #334155;
            cursor: pointer;
            font-size: 12px;
        }

        #doc-sidebar .side-actions button:hover {
            background: #f8fafc;
        }

        /* 侧滑栏右上角关闭按钮 */
        #btn-close-sidebar {
            position: absolute;
            top: 8px;
            right: 12px;
            width: 28px;
            height: 28px;
            padding: 0;
            border: none;
            background: transparent;
            color: #64748b;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        #btn-close-sidebar:hover {
            background: #f1f5f9;
            color: #475569;
        }

        #doc-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .doc-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            border: 1px solid #f1f5f9;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #fff;
            cursor: pointer;
            transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.2s ease;
            position: relative;
        }

        .doc-item:hover {
            background-color: #f8fafc;
            border-color: #e2e8f0;
        }

        .doc-item.active {
            background-color: #e0f2fe;
            border-color: #0ea5e9;
            border-left: 3px solid #0ea5e9;
        }

        .doc-item.dragging {
            opacity: 0.5;
            transform: rotate(2deg);
            z-index: 1000;
        }

        .doc-item.drag-over {
            border-color: #0ea5e9;
            background-color: #f0f9ff;
            transform: translateY(2px);
        }

        .doc-item:not(.batch-mode) {
            cursor: move;
        }

        /* 复选框样式 */
        .doc-checkbox {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .doc-item.batch-mode {
            padding-left: 12px;
            justify-content: flex-start;
        }

        .doc-item.batch-mode .doc-name {
            max-width: 260px;
            margin-left: 8px;
            flex: 1;
        }

        .doc-name {
            font-size: 13px;
            color: #0f172a;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 300px;
        }

        .doc-buttons {
            display: flex;
            gap: 6px;
        }

        .doc-item.batch-mode .doc-buttons {
            display: none;
        }

        .doc-buttons button {
            height: 24px;
            padding: 0 8px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background: #fff;
            color: #334155;
            font-size: 12px;
            cursor: pointer;
        }

        .doc-buttons button:hover {
            background: #f8fafc;
        }

        .side-footer {
            border-top: 1px solid #f1f5f9;
            padding: 8px;
            display: flex;
            gap: 6px;
        }

        .side-footer input[type="file"] {
            display: none;
        }
    </style>

            <span style="display:block;height:2px;background:#0f172a;border-radius:2px;margin-top:3px;"></span>
            <span style="display:block;height:2px;background:#0f172a;border-radius:2px;margin-top:3px;"></span>
        </span>
    </button>

        <div id="doc-list"></div>

            </div>
            <div class="confirm-buttons">
                <button id="new-doc-cancel" data-i18n="docs.cancel">取消</button>
                <button id="new-doc-ai" class="confirm-btn" style="background: #10b981; border-color: #059669;"

    <!-- 初始化图片存储迁移 -->
    <script>
        window.addEventListener('load', async () => {
            if (window.ImageStorageManager) {
                window.imageStorage = new ImageStorageManager();
                // 执行一次性迁移
                const result = await window.imageStorage.migrateFromLocalStorage();
                if (result.migratedCount > 0) {
                    console.log(`[app] 成功迁移 ${result.migratedCount} 张图片到 IndexedDB`);
                }
            }
        });
    </script>

    <!-- Bootstrap JS for notifications - 延迟加载 -->

            jqueryScript.onload = () => {
                const bootstrapScript = document.createElement('script');
                bootstrapScript.src = '/local-deps/bootstrap.bundle.min.js';
                document.body.appendChild(bootstrapScript);
            };
            document.body.appendChild(jqueryScript);
        }, 1000);
    </script>

    <!-- 管理三个Iframe的展示、切换、拖拽调整宽度、专注模式、移动端自动专注 -->
    <script src="three-iframes.js" defer></script>

    <!-- 初始化应用，包括 
        1. 恢复用户状态 （专注模式、布局等）
        2. 加载并渲染三大面板 （根据 PAGE_CONFIG 动态创建 iframe）
        3. 绑定所有全局对话框 （新建、删除确认）的交互与快捷键
        4. 注入 AI 弹窗托管层 （ aiModalFrame ），让子页面通过 postMessage 调用 AI 服务
        5. 预加载 AI 提示词模板 到全局变量 window.__prompt_templates
        6. 调用移动端自动专注模式 （ initMobileFocus ），移动端把三个面板显示到下面。
        7. 统一监听子页面消息 （通知、AI 调用等）-->
    <script src="init.js" defer> </script>

    <!-- 非关键脚本延迟加载 - 使用 requestIdleCallback 在浏览器空闲时加载 -->
    <script>
        // 使用 requestIdleCallback 在浏览器空闲时加载非关键脚本
        function loadNonCriticalScripts() {
            const scriptsToLoad = [
                'utils/note-image-utils.js',
                'mobile-suit.js',
                'msg-listener-show.js',
                'documents.js',
                'copynew_file.js',
                'user.js',
                'language-switch.js'
            ];
            
            // 串行加载，避免同时请求阻塞网络
            let index = 0;
            function loadNext() {
                if (index >= scriptsToLoad.length) return;
                
                const scriptSrc = scriptsToLoad[index++];
                const script = document.createElement('script');
                script.src = scriptSrc;
                script.defer = true;
                script.onload = loadNext;
                script.onerror = loadNext; // 错误也继续加载下一个
                document.body.appendChild(script);
            }
            
            // 同时启动2个加载队列，加快总体速度
            loadNext();
            loadNext();
        }
        
        // 使用 requestIdleCallback 或 setTimeout 延迟加载
        if (typeof requestIdleCallback !== 'undefined') {
            requestIdleCallback(loadNonCriticalScripts, { timeout: 1000 });
        } else {
            setTimeout(loadNonCriticalScripts, 800);
        }
    </script>

    <!-- 滚动条优化：滚动时显示滚动条 -->
    <script>
        (function () {
            // 等待 DOM 加载完成
            function initScrollbarOptimization() {
                // 为所有 panel-content 添加滚动事件监听
                const panelContents = document.querySelectorAll('.panel-content');
                panelContents.forEach(function (panelContent) {
                    let scrollTimeout;
                    panelContent.addEventListener('scroll', function () {
                        panelContent.classList.add('scrolling');
                        clearTimeout(scrollTimeout);
                        scrollTimeout = setTimeout(function () {
                            panelContent.classList.remove('scrolling');
                        }, 500); // 滚动停止500ms后隐藏滚动条
                    }, { passive: true });
                });
            }

            // DOMContentLoaded 时初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initScrollbarOptimization);
            } else {
                initScrollbarOptimization();
            }

            // 延迟执行，确保 iframe 加载完成
            setTimeout(initScrollbarOptimization, 1000);
        })();

    <!-- PWA安装功能 -->
    <script>
        // PWA安装事件处理
        let deferredPrompt = null;

        // 监听beforeinstallprompt事件
        window.addEventListener('beforeinstallprompt', (e) => {
            // 防止默认的浏览器安装提示
            e.preventDefault();
            // 保存事件对象
            deferredPrompt = e;
            // 显示安装按钮
            const installButton = document.getElementById('pwa-install-btn');
            const installMenuItem = document.getElementById('pwa-install-menu-item');
            if (installButton) {
                installButton.style.display = 'flex';
            }
            if (installMenuItem) {
                installMenuItem.style.display = 'flex';
            }
        });

        // PWA安装函数
        function installPWA() {
            if (!deferredPrompt) {
                console.log('MindWord PWA: 当前环境不支持安装');
                showInstallMessage('当前浏览器或设备不支持PWA安装功能', 'warning');
                return;
            }

            // 显示安装提示
            deferredPrompt.prompt();

            // 等待用户选择
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('MindWord PWA: 用户接受了安装');
                    showInstallMessage('应用安装成功！请检查桌面或应用列表', 'success');
                    // 隐藏安装按钮
                    const installButton = document.getElementById('pwa-install-btn');
                    const installMenuItem = document.getElementById('pwa-install-menu-item');
                    if (installButton) {
                        installButton.style.display = 'none';
                    }
                    if (installMenuItem) {
                        installMenuItem.style.display = 'none';
                    }
                } else {
                    console.log('MindWord PWA: 用户拒绝了安装');
                    showInstallMessage('您取消了安装，可随时点击安装按钮重试', 'info');
                }
                // 清空deferredPrompt
                deferredPrompt = null;
            }).catch((error) => {
                console.error('MindWord PWA: 安装过程出错:', error);
                showInstallMessage('安装过程中出现错误，请稍后重试', 'error');
            });
        }

        // 显示安装消息提示
        function showInstallMessage(message, type = 'info') {
            // 创建消息元素
            const messageDiv = document.createElement('div');

            // 设置基础样式
            messageDiv.style.position = 'fixed';
            messageDiv.style.top = '20px';
            messageDiv.style.right = '20px';
            messageDiv.style.padding = '12px 16px';
            messageDiv.style.borderRadius = '6px';
            messageDiv.style.fontSize = '14px';
            messageDiv.style.zIndex = '10000';
            messageDiv.style.maxWidth = '300px';
            messageDiv.style.wordWrap = 'break-word';
            messageDiv.style.transition = 'all 0.3s ease';
            messageDiv.style.color = 'white';

            // 根据类型设置背景色
            if (type === 'success') {
                messageDiv.style.backgroundColor = '#10b981';
            } else if (type === 'warning') {
                messageDiv.style.backgroundColor = '#f59e0b';
            } else if (type === 'error') {
                messageDiv.style.backgroundColor = '#ef4444';
            } else {
                messageDiv.style.backgroundColor = '#3b82f6';
            }

            messageDiv.textContent = message;

            // 添加到页面
            document.body.appendChild(messageDiv);

            // 3秒后自动移除
            setTimeout(() => {
                if (messageDiv.parentNode) {
                    messageDiv.style.opacity = '0';
                    setTimeout(() => {
                        messageDiv.remove();
                    }, 300);
                }
            }, 3000);
        }

        // 检查是否已经安装（对于已安装的PWA，隐藏安装按钮）
        window.addEventListener('load', () => {
            if (window.matchMedia('(display-mode: standalone)').matches ||
                window.navigator.standalone === true) {
                // 当前已经是独立应用模式，隐藏安装按钮
                const installButton = document.getElementById('pwa-install-btn');
                const installMenuItem = document.getElementById('pwa-install-menu-item');
                if (installButton) {
                    installButton.style.display = 'none';
                }
                if (installMenuItem) {
                    installMenuItem.style.display = 'none';
                }
                console.log('MindWord PWA: 当前已是独立应用模式');
            }
        });
    </script>

    <!-- PWA Service Worker Registration -->
    <script>
        // 注册Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('MindWord PWA: Service Worker 注册成功');

                        // 监听更新
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // 发现新版本
                                    console.log('MindWord PWA: 发现新版本');
                                    if (confirm('MindWord有新版本可用，是否立即更新？')) {
                                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch(error => {
                        console.error('MindWord PWA: Service Worker 注册失败:', error);
                    });
            });
        }

        // 监听应用安装成功
        window.addEventListener('appinstalled', () => {
            console.log('MindWord PWA: 应用安装成功');
            deferredPrompt = null;
        });

        // 更多选项下拉菜单功能
        document.addEventListener('DOMContentLoaded', () => {
            const moreOptionsBtn = document.getElementById('more-options-btn');
            const moreOptionsMenu = document.getElementById('more-options-menu');
            let isMenuOpen = false;

            // 点击更多选项按钮切换菜单显示状态
            if (moreOptionsBtn && moreOptionsMenu) {
                moreOptionsBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    isMenuOpen = !isMenuOpen;
                    moreOptionsMenu.style.display = isMenuOpen ? 'block' : 'none';

                    // 如果菜单打开，设置点击外部关闭处理
                    if (isMenuOpen) {
                        setupClickOutsideHandler();
                        // 添加ESC键支持
                        document.addEventListener('keydown', handleEscKey);
                    } else {
                        removeClickOutsideHandler();
                        document.removeEventListener('keydown', handleEscKey);
                    }
                });

                // 菜单项悬停效果
                const menuItems = moreOptionsMenu.querySelectorAll('.menu-item');
                menuItems.forEach(item => {
                    item.addEventListener('mouseenter', () => {
                        item.style.backgroundColor = '#f8fafc';
                    });
                    item.addEventListener('mouseleave', () => {
                        item.style.backgroundColor = 'transparent';
                    });
                });
            }

            // 设置点击外部区域关闭菜单的处理函数
            function setupClickOutsideHandler() {
                document.addEventListener('click', handleClickOutside);
            }

            // 移除点击外部区域关闭菜单的处理函数
            function removeClickOutsideHandler() {
                document.removeEventListener('click', handleClickOutside);
            }

            // 处理点击外部区域的逻辑
            function handleClickOutside(e) {
                if (moreOptionsMenu && moreOptionsMenu.style.display === 'block') {
                    if (!moreOptionsMenu.contains(e.target) && e.target !== moreOptionsBtn) {
                        moreOptionsMenu.style.display = 'none';
                        isMenuOpen = false;
                        removeClickOutsideHandler();
                        document.removeEventListener('keydown', handleEscKey);
                    }
                }
            }

            // 处理ESC键关闭菜单
            function handleEscKey(e) {
                if (e.key === 'Escape' && moreOptionsMenu && moreOptionsMenu.style.display === 'block') {
                    moreOptionsMenu.style.display = 'none';
                    isMenuOpen = false;
                    removeClickOutsideHandler();
                    document.removeEventListener('keydown', handleEscKey);
                }
            }
        });
    </script>
