<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWord - 版本信息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .info-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #495057;
            font-size: 14px;
        }

        .info-value {
            color: #212529;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            background: white;
            padding: 4px 12px;
            border-radius: 6px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #495057;
            border: 1px solid #dee2e6;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .cache-list {
            margin-top: 20px;
        }

        .cache-item {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cache-name {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #495057;
        }

        .cache-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 4px 12px;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 MindWord 版本信息</h1>
            <p>查看当前Service Worker和缓存状态</p>
        </div>

        <div class="content">
            <div id="loading" class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载版本信息...</p>
            </div>

            <div id="version-info" style="display: none;">
                <div class="info-card">
                    <div class="info-row">
                        <span class="info-label">Service Worker 版本</span>
                        <span id="sw-version" class="info-value">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">缓存名称</span>
                        <span id="cache-name" class="info-value">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">构建时间</span>
                        <span id="build-time" class="info-value">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">SW 状态</span>
                        <span id="sw-status" class="status pending">检查中...</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">更新可用</span>
                        <span id="update-available" class="status pending">检查中...</span>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" onclick="checkForUpdate()">
                        🔄 检查更新
                    </button>
                    <button class="btn btn-secondary" onclick="clearAllCaches()">
                        🗑️ 清除缓存
                    </button>
                </div>

                <div class="cache-list">
                    <h3 style="margin-bottom: 12px; color: #495057;">📦 缓存列表</h3>
                    <div id="cache-list-content"></div>
                </div>

                <a href="/" class="back-link">← 返回首页</a>
            </div>
        </div>
    </div>

    <script>
        let swRegistration = null;

        async function init() {
            try {
                // 检查Service Worker支持
                if (!('serviceWorker' in navigator)) {
                    showError('浏览器不支持Service Worker');
                    return;
                }

                // 获取Service Worker注册信息
                swRegistration = await navigator.serviceWorker.getRegistration();

                if (!swRegistration) {
                    showError('未找到Service Worker注册');
                    return;
                }

                // 等待Service Worker激活
                if (!navigator.serviceWorker.controller) {
                    console.log('等待Service Worker激活...');
                    await new Promise(resolve => {
                        navigator.serviceWorker.addEventListener('controllerchange', resolve);
                    });
                }

                // 查询版本信息
                await queryVersion();

                // 获取缓存列表
                await updateCacheList();

                // 显示版本信息
                document.getElementById('loading').style.display = 'none';
                document.getElementById('version-info').style.display = 'block';

            } catch (error) {
                console.error('初始化失败:', error);
                showError('初始化失败: ' + error.message);
            }
        }

        async function queryVersion() {
            return new Promise((resolve, reject) => {
                const messageChannel = new MessageChannel();

                messageChannel.port1.onmessage = (event) => {
                    const data = event.data;
                    console.log('版本信息:', data);

                    // 更新UI
                    document.getElementById('sw-version').textContent = data.version || '-';
                    document.getElementById('cache-name').textContent = data.cacheName || '-';
                    document.getElementById('build-time').textContent = data.buildTime || '-';

                    // 更新状态
                    const statusEl = document.getElementById('sw-status');
                    statusEl.className = 'status success';
                    statusEl.textContent = '✅ 已激活';

                    resolve(data);
                };

                navigator.serviceWorker.controller.postMessage(
                    { type: 'GET_VERSION' },
                    [messageChannel.port2]
                );

                // 超时处理
                setTimeout(() => {
                    reject(new Error('版本查询超时'));
                }, 5000);
            });
        }

        async function updateCacheList() {
            const cacheNames = await caches.keys();
            const listContent = document.getElementById('cache-list-content');
            listContent.innerHTML = '';

            if (cacheNames.length === 0) {
                listContent.innerHTML = '<p style="color: #6c757d; text-align: center;">暂无缓存</p>';
                return;
            }

            for (const cacheName of cacheNames) {
                const cache = await caches.open(cacheName);
                const keys = await cache.keys();
                const size = keys.length;

                const item = document.createElement('div');
                item.className = 'cache-item';
                item.innerHTML = `
                    <span class="cache-name">${cacheName} (${size} 个文件)</span>
                    <div class="cache-actions">
                        <button class="btn btn-secondary btn-small" onclick="deleteCache('${cacheName}')">
                            删除
                        </button>
                    </div>
                `;
                listContent.appendChild(item);
            }
        }

        async function checkForUpdate() {
            try {
                if (!swRegistration) {
                    alert('Service Worker 未注册');
                    return;
                }

                const updateBtn = event.target;
                updateBtn.disabled = true;
                updateBtn.textContent = '⏳ 检查中...';

                await swRegistration.update();

                setTimeout(() => {
                    updateBtn.disabled = false;
                    updateBtn.textContent = '🔄 检查更新';

                    // 更新状态
                    const updateAvailableEl = document.getElementById('update-available');
                    if (MindWordSW && MindWordSW.isUpdateAvailable()) {
                        updateAvailableEl.className = 'status success';
                        updateAvailableEl.textContent = '✅ 有新版本';
                    } else {
                        updateAvailableEl.className = 'status success';
                        updateAvailableEl.textContent = '✅ 已是最新';
                    }
                }, 2000);

            } catch (error) {
                console.error('检查更新失败:', error);
                alert('检查更新失败: ' + error.message);
            }
        }

        async function clearAllCaches() {
            if (!confirm('确定要清除所有缓存吗？这可能会导致应用需要重新下载所有资源。')) {
                return;
            }

            try {
                const cacheNames = await caches.keys();
                await Promise.all(cacheNames.map(name => caches.delete(name)));

                alert('缓存已清除，页面将重新加载');
                window.location.reload();
            } catch (error) {
                console.error('清除缓存失败:', error);
                alert('清除缓存失败: ' + error.message);
            }
        }

        async function deleteCache(cacheName) {
            if (!confirm(`确定要删除缓存 "${cacheName}" 吗？`)) {
                return;
            }

            try {
                await caches.delete(cacheName);
                await updateCacheList();
                alert(`缓存 "${cacheName}" 已删除`);
            } catch (error) {
                console.error('删除缓存失败:', error);
                alert('删除缓存失败: ' + error.message);
            }
        }

        function showError(message) {
            document.getElementById('loading').innerHTML = `
                <div style="color: #dc3545; text-align: center;">
                    <p style="font-size: 18px; margin-bottom: 10px;">❌ 错误</p>
                    <p>${message}</p>
                </div>
            `;
        }

        // 页面加载完成后初始化
        window.addEventListener('load', init);

        // 监听Service Worker更新
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                console.log('Service Worker已更新');
                window.location.reload();
            });
        }
    </script>
</body>
</html>
